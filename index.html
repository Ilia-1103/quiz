<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Своя игра</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    text-align: center;
    background: linear-gradient(to bottom, #ff9eb5, #ffffff);
    min-height: 100vh;
}

h1 {
    margin-top: 30px;
    font-size: 50px;
    color: #fff;
}

.subtitle {
    margin-bottom: 30px;
    font-size: 18px;
    color: #fff;
}

/* Контейнер */
.container {
    display: flex;
    justify-content: center;
    gap: 30px; /* уменьшили расстояние */
    padding: 40px;
    max-width: 1600px;
    margin: 0 auto;
}

/* Колонки */
.column {
    background: white;
    border-radius: 25px;
    padding: 25px;
    width: 300px; /* сделали шире */
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
}

/* ШИРОКИЙ БЛОК (невеста) */
.column.wide {
    width: 600px; /* в 2 раза шире */
}

.column-title {
    font-weight: bold;
    margin-bottom: 20px;
    font-size: 18px;
}

/* Сетка */
.cards-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
}

/* Для невесты — 2 колонки */
.column.wide .cards-grid {
    grid-template-columns: repeat(2, 1fr);
}

/* Карточки */
.card {
    perspective: 1000px;
}

.card-inner {
    position: relative;
    width: 100%;
    height: 70px;
    transition: transform 0.6s;
    transform-style: preserve-3d;
    cursor: pointer;
}

.card.flip .card-inner {
    transform: rotateY(180deg);
}

.card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
    backface-visibility: hidden;
    font-size: 20px;
}

.card-front {
    background: linear-gradient(135deg, #ffd6e0, #fff);
}

.card-back {
    background: linear-gradient(135deg, #ff7aa2, #ffb6c1);
    color: white;
    transform: rotateY(180deg);
}

/* Модалка */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    backdrop-filter: blur(8px);
    background: rgba(0,0,0,0.4);
    justify-content: center;
    align-items: center;
}

.modal.active {
    display: flex;
}

.modal-content {
    background: white;
    padding: 40px;
    width: 650px;
    border-radius: 25px;
    position: relative;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from {
        transform: scale(0.8) translateY(20px);
        opacity: 0;
    }
    to {
        transform: scale(1) translateY(0);
        opacity: 1;
    }
}

.close {
    position: absolute;
    right: 15px;
    top: 10px;
    cursor: pointer;
    font-size: 22px;
}

#question {
    font-size: 24px;
    line-height: 1.5;
}

/* Кнопка */
button {
    display: block;
    margin: 30px auto;
    padding: 14px 35px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(135deg, #ff7aa2, #ffb6c1);
    color: white;
    font-size: 16px;
    cursor: pointer;
}

#answer {
    font-size: 22px;
    margin-top: 15px;
}

/* Конфетти */
.confetti-piece {
    position: fixed;
    width: 8px;
    height: 14px;
    top: 0;
    animation: confetti-fall 1.5s linear forwards;
}

@keyframes confetti-fall {
    to {
        transform: translateY(600px) rotate(720deg);
        opacity: 0;
    }
}
</style>

</head>
<body>

<h1>Своя игра</h1>
<div class="subtitle">Выберите категорию и стоимость вопроса</div>

<div class="container" id="game"></div>

<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">✖</span>
        <h2 id="question"></h2>
        <button id="answerBtn">Правильный ответ</button>
        <p id="answer"></p>
    </div>
</div>

<script>
const data = [
{
    title: "Общие вопросы",
    questions: [
        ["Где и при каких обстоятельствах они познакомились?", "В Дайвинчике"],
        ["Как зовут будущего мужа?", "Тузилов Сергей Александрович"],
        ["Кто первым признался в любви?", "Сергей"],
        ["Где было первое свидание?", "После работы покатались на машине"],
        ["Какой был первый подарок жениха невесте?", "Цветы и коробка конфет"]
    ]
},
{
    title: "Про невесту",
    wide: true,
    questions: [
        ["Кем Марина хотела стать в детстве?", "Учителем рисования"],
        ["В каком возрасте невеста впервые поцеловалась?", "В 15 лет"],
        ["Сколько просмотров набрал самый большой тик ток невесты?", "667 тысяч"],
        ["Какая была ее самая дикая выходка в универе/школе?", "не было таких"],
        ["Что невеста любит больше всего?", "Жениха конечно"],

        ["Сколько серьёзных отношений у Марины было до Сергея?", "Одни"],
        ["Какую самую странную вещь Марина хранит в сумочке?", "Такой нет"],
        ["Что делает невеста, когда её никто не видит?", "Разговаривает с Алисой"],
        ["Какие блюдо от жениха Марине нравится больше всего?", "Просто суп"],
        ["Что сказала Марина подружкам после первой встречи с Сергеем?", "Думала будут просто друзьями"]
    ]
},
{
    title: "Про жениха",
    questions: [
        ["Какой размер ноги у жениха?", "45 размер"],
        ["Что жених обычно ест на завтрак?", "Яичницу, но чаще всего не завтракает"],
        ["Какое хобби жениха бесит невесту?", "Компьютерные игры"],
        ["Какая у жениха смешная привычка?", "При прощание говорить \"с Новым годом\" или \"с днём рождения \""],
        ["Какое слово жених произносит чаще всего?", "Здравствуй, солнце"]
    ]
}
];

const game = document.getElementById("game");
const modal = document.getElementById("modal");
const questionEl = document.getElementById("question");
const answerEl = document.getElementById("answer");
const answerBtn = document.getElementById("answerBtn");

let currentCard = null;

data.forEach(col => {
    const column = document.createElement("div");
    column.className = "column";
    if (col.wide) column.classList.add("wide");

    const title = document.createElement("div");
    title.className = "column-title";
    title.innerText = col.title;

    const grid = document.createElement("div");
    grid.className = "cards-grid";

    col.questions.forEach((q, i) => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="card-inner">
                <div class="card-front">${(i % 5 + 1) * 100}</div>
                <div class="card-back">?</div>
            </div>
        `;

        card.onclick = () => {
            card.classList.add("flip");
            setTimeout(() => openModal(q[0], q[1], card), 400);
        };

        grid.appendChild(card);
    });

    column.appendChild(title);
    column.appendChild(grid);
    game.appendChild(column);
});

function openModal(question, answer, card) {
    modal.classList.add("active");
    questionEl.innerText = question;
    answerEl.innerText = "";
    answerBtn.style.display = "block";

    currentCard = card;

    answerBtn.onclick = () => {
        answerEl.innerText = answer;
        answerBtn.style.display = "none";
        launchConfetti();
    };
}

function closeModal() {
    modal.classList.remove("active");
    if (currentCard) currentCard.style.visibility = "hidden";
}

function launchConfetti() {
    const colors = ["#ff7aa2", "#ffd1dc", "#fff", "#ffb6c1"];

    for (let i = 0; i < 70; i++) {
        const confetti = document.createElement("div");
        confetti.className = "confetti-piece";

        confetti.style.left = Math.random() * 100 + "%";
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];

        document.body.appendChild(confetti);

        setTimeout(() => confetti.remove(), 1500);
    }
}
</script>

</body>
</html>
